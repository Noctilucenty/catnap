<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Leon AI | Enterprise OS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    :root {
      --bg: #030304; --glass: rgba(18, 18, 23, 0.7); --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #007AFF; --accent-glow: rgba(0, 122, 255, 0.3); --text-main: #FFFFFF; --text-dim: #8E8E93;
      --green: #32D74B; --yellow: #ffd60a; --red: #ff453a; --radius-lg: 20px; --radius-md: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 0% 0%, rgba(0, 122, 255, 0.05) 0%, transparent 50%); }
    .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar { background: rgba(0, 0, 0, 0.3); border-right: 1px solid var(--glass-border); padding: 40px 24px; display: flex; flex-direction: column; backdrop-filter: blur(20px); }
    .brand { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
    .brand-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 4px; box-shadow: 0 0 15px var(--accent); }
    .nav-section { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1.5px; margin: 20px 0 10px 10px; }
    .nav-link { padding: 12px 18px; border-radius: var(--radius-md); color: var(--text-dim); font-weight: 600; font-size: 0.9rem; transition: 0.2s; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
    .nav-link.active { background: var(--accent); color: #fff; box-shadow: 0 8px 16px var(--accent-glow); }

    /* ── Main Canvas ── */
    .canvas { padding: 40px; overflow-y: auto; height: 100vh; }
    .page { display: none; animation: fadeIn 0.3s ease-out; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end; }
    .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; }

    /* ── Glass Panels ── */
    .glass-panel { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 24px; backdrop-filter: blur(10px); }
    .panel-title { font-weight: 700; font-size: 1rem; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; color: var(--text-dim); }

    /* ── Calendar UI ── */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .cal-day-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
    .cal-day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative; }
    .cal-day:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); }
    .cal-day.today { color: var(--accent); font-weight: 800; }
    .cal-day.selected { background: var(--accent); color: white; box-shadow: 0 5px 15px var(--accent-glow); }
    .cal-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; position: absolute; bottom: 8px; }

    /* ── List Items ── */
    .row { display: flex; align-items: center; gap: 16px; padding: 14px; border-radius: var(--radius-md); background: rgba(255,255,255,0.02); margin-bottom: 8px; border: 1px solid transparent; transition: 0.2s; }
    .row:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; background: rgba(0, 122, 255, 0.1); color: var(--accent); }

    /* ── Forms & Buttons ── */
    input, select, textarea { width: 100%; background: #1c1c1e; border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 15px; font-family: inherit; }
    .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn:hover { opacity: 0.9; box-shadow: 0 0 15px var(--accent-glow); }
    .btn-sm { padding: 6px 12px; font-size: 0.75rem; }

    /* ── Chat/Simulation ── */
    .chat-box { height: 350px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
    .msg { margin-bottom: 10px; padding: 12px; border-radius: 12px; font-size: 0.85rem; max-width: 80%; }
    .msg.user { background: var(--accent); margin-left: auto; border-bottom-right-radius: 2px; }
    .msg.assistant { background: rgba(255,255,255,0.05); border-bottom-left-radius: 2px; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="brand-dot"></div> Leon AI</div>
    <div class="nav-section">Dashboard</div>
    <div class="nav-link active" id="nav-overview" onclick="showPage('overview')">Overview</div>
    <div class="nav-link" id="nav-requests" onclick="showPage('requests')">Requests</div>
    <div class="nav-link" id="nav-bookings" onclick="showPage('bookings')">Bookings</div>
    <div class="nav-link" id="nav-reviews" onclick="showPage('reviews')">Reviews</div>
    <div class="nav-section">Tools</div>
    <div class="nav-link" id="nav-assistant" onclick="showPage('assistant')">Assistant</div>
    <div class="nav-link" id="nav-console" onclick="showPage('console')">Test Console</div>
  </aside>

  <main class="canvas">
    
    <div id="page-overview" class="page active">
      <div class="header"><h1>Overview</h1></div>
      <div id="metricsRow" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; margin-bottom:30px;"></div>
      <div class="glass-panel"><h3>Recent Intake</h3><div id="overviewStream"></div></div>
    </div>

    <div id="page-bookings" class="page">
      <div class="header"><h1>Schedule</h1><p style="color:var(--text-dim)">Manage appointments, tasks, and notes.</p></div>
      <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap: 32px;">
        <div class="glass-panel">
          <div class="cal-header">
            <h2 id="calMonth">March 2026</h2>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-sm" onclick="changeMonth(-1)">Prev</button>
              <button class="btn btn-sm" onclick="changeMonth(1)">Next</button>
            </div>
          </div>
          <div class="cal-grid">
            <div class="cal-day-label">Sun</div><div class="cal-day-label">Mon</div><div class="cal-day-label">Tue</div>
            <div class="cal-day-label">Wed</div><div class="cal-day-label">Thu</div><div class="cal-day-label">Fri</div><div class="cal-day-label">Sat</div>
          </div>
          <div class="cal-grid" id="calendarGrid"></div>
        </div>
        <div class="glass-panel">
          <div class="panel-title" id="selectedDateTitle">Select a date</div>
          <div id="dayContent" style="margin-bottom: 30px;"></div>
          
          <div style="border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <div class="panel-title">Add Task / Note</div>
            <input type="text" id="taskInput" placeholder="Task description (e.g. Call back Leon regarding RS5)">
            <textarea id="noteInput" placeholder="Detailed notes..."></textarea>
            <button class="btn" style="width:100%" onclick="addTask()">Add to Schedule</button>
          </div>
        </div>
      </div>
    </div>

    <div id="page-requests" class="page">
      <div class="header"><h1>Archive</h1></div>
      <div class="glass-panel" id="archiveContent"></div>
    </div>

    <div id="page-reviews" class="page">
      <div class="header"><h1>Reviews</h1></div>
      <div class="glass-panel" id="allReviews"></div>
    </div>

    <div id="page-console" class="page">
      <div class="header"><h1>Test Console</h1></div>
      <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:24px;">
        <div class="glass-panel">
          <h3>New Simulation</h3>
          <input id="simPhone" placeholder="Phone Number"><select id="simChannel"><option value="phone">Phone</option><option value="sms">SMS</option></select>
          <button class="btn" style="width:100%" onclick="startSim()">Create Session</button>
        </div>
        <div class="glass-panel">
          <div class="chat-box" id="simTranscript"></div>
          <input id="simInput" placeholder="Type customer response..." disabled><button class="btn" id="simSend" onclick="sendSim()" disabled>Send</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let selectedDate = new Date().toISOString().split('T')[0];
  let localTasks = {}; // Store tasks in memory for MVP

  const api = async (u, o={}) => (await fetch(u,o)).json();

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    document.getElementById('nav-'+id).classList.add('active');
  }

  // ── Calendar Engine ──
  function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const monthLabel = document.getElementById('calMonth');
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    monthLabel.textContent = `${months[currentMonth]} ${currentYear}`;
    
    grid.innerHTML = "";
    // Padding for first day
    for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
    
    for(let i=1; i<=daysInMonth; i++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const isSelected = dateStr === selectedDate;
      const isToday = dateStr === new Date().toISOString().split('T')[0];
      const hasTask = localTasks[dateStr];
      
      grid.innerHTML += `<div class="cal-day ${isSelected?'selected':''} ${isToday?'today':''}" onclick="selectDate('${dateStr}')">${i}${hasTask?'<div class="cal-dot"></div>':''}</div>`;
    }
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if(currentMonth < 0) { currentMonth = 11; currentYear--; }
    if(currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  async function selectDate(ds) {
    selectedDate = ds;
    document.getElementById('selectedDateTitle').textContent = `Activity for ${new Date(ds).toLocaleDateString()}`;
    renderCalendar();
    
    // Fetch bookings for this day (Mocked for now, or use /bookings API)
    const bookings = await api(`/bookings?date=${ds}`);
    let html = bookings.map(b => `<div class="row"><div class="badge">${b.booking_time}</div><div><strong>${b.customer_name}</strong> &middot; ${b.service}</div></div>`).join('');
    
    // Add local tasks
    if(localTasks[ds]) {
      html += localTasks[ds].map(t => `<div class="row" style="border-left:3px solid var(--accent)"><div><strong>NOTE:</strong> ${t.task}</div><div style="font-size:0.75rem; color:var(--text-dim)">${t.note}</div></div>`).join('');
    }
    
    document.getElementById('dayContent').innerHTML = html || '<p style="color:var(--text-dim)">No bookings or tasks for this day.</p>';
  }

  function addTask() {
    const task = document.getElementById('taskInput').value;
    const note = document.getElementById('noteInput').value;
    if(!task) return;
    
    if(!localTasks[selectedDate]) localTasks[selectedDate] = [];
    localTasks[selectedDate].push({task, note});
    
    document.getElementById('taskInput').value = "";
    document.getElementById('noteInput').value = "";
    selectDate(selectedDate);
  }

  // ── Core App Logic ──
  async function refresh() {
    const [t, r] = await Promise.all([api('/tickets?limit=10'), api('/reviews')]);
    document.getElementById('metricsRow').innerHTML = `<div class="m-card"><div class="m-label">Intake</div><div class="m-value">${t.length}</div></div><div class="m-card"><div class="m-label">Accuracy</div><div class="m-value">92%</div></div><div class="m-card"><div class="m-label">Reviews</div><div class="m-value">${r.length}</div></div><div class="m-card"><div class="m-label">Latency</div><div class="m-value">0.8s</div></div>`;
    
    const html = t.map(x => `<div class="row"><div class="avatar">${initials(x.customer_name)}</div><div style="flex:1"><div style="font-weight:700">${x.customer_name||'Guest'}</div><div style="font-size:0.8rem; color:var(--text-dim)">${x.service||'General Inquiry'}</div></div><span class="badge">${x.status.replace('_',' ')}</span></div>`).join('');
    document.getElementById('overviewStream').innerHTML = html;
    document.getElementById('archiveContent').innerHTML = html;
  }

  // ── Test Console Simulation ──
  let simId = null;
  async function startSim() {
    const s = await api('/sessions', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: document.getElementById('simPhone').value, channel: document.getElementById('simChannel').value})});
    simId = s.session_id; document.getElementById('simInput').disabled = false; document.getElementById('simSend').disabled = false;
    updateSim(s.transcript);
  }
  async function sendSim() {
    const inp = document.getElementById('simInput');
    const s = await api(`/sessions/${simId}/turn`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_input: inp.value})});
    inp.value = ""; updateSim(s.transcript); refresh();
  }
  function updateSim(t) { document.getElementById('simTranscript').innerHTML = t.map(m=>`<div class="msg ${m.role}">${m.content}</div>`).join(''); }

  function openSettings() { alert('Settings Modal Placeholder'); }
  const initials = n => n ? n.split(' ').map(x=>x[0]).join('').toUpperCase() : 'AI';

  renderCalendar();
  selectDate(selectedDate);
  refresh();
  setInterval(refresh, 5000);
</script>

</body>
</html>
